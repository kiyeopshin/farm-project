<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🌾 양파 재배 통합 타임라인</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1a12;color:#cde8cd;font-family:'Segoe UI',sans-serif;font-size:13px;}
header{background:#0a1409;border-bottom:1px solid #1e3a20;padding:12px 20px;display:flex;align-items:center;gap:12px;}
header h1{font-size:15px;font-weight:700;color:#6ddb6d;}
header span{margin-left:auto;font-size:11px;color:#5a7a5a;}

/* 날짜 선택 슬라이더 */
.date-bar{background:#0c160e;border-bottom:1px solid #1e3a20;padding:10px 20px;display:flex;align-items:center;gap:14px;}
.date-bar label{font-size:11px;color:#7a9a7a;white-space:nowrap;}
input[type=range]{flex:1;accent-color:#4caf50;cursor:pointer;}
.date-display{font-size:13px;font-weight:700;color:#a5d6a7;min-width:70px;text-align:center;}

/* 요약 카드 */
.kpi-row{display:flex;gap:10px;padding:12px 20px;background:#0c160e;border-bottom:1px solid #1e3a20;flex-wrap:wrap;}
.kpi{background:#111e14;border:1px solid #1e3a20;border-radius:8px;padding:10px 16px;min-width:110px;flex:1;}
.kpi .k-label{font-size:10px;color:#5a7a5a;margin-bottom:4px;}
.kpi .k-val{font-size:22px;font-weight:700;}
.kpi .k-sub{font-size:10px;color:#5a7a5a;margin-top:2px;}

/* 차트 영역 */
.main-wrap{padding:14px 20px;display:flex;flex-direction:column;gap:12px;}
.card{background:#111e14;border:1px solid #1e3a20;border-radius:10px;padding:14px;}
.card-title{font-size:11px;font-weight:700;color:#7ddb7d;margin-bottom:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* stage legend */
.stage-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.sl{font-size:10px;padding:2px 10px;border-radius:10px;font-weight:600;}
</style>
</head>
<body>

<header>
  <h1>🌾 양파 재배 통합 타임라인 대시보드</h1>
  <span>2025.09 ~ 2026.06 | 월별 환경·생육 데이터</span>
</header>

<!-- 날짜 슬라이더 -->
<div class="date-bar">
  <label>📅 시점 선택</label>
  <input type="range" id="slider" min="0" max="9" value="4" step="1"/>
  <div class="date-display" id="dateDisplay"></div>
</div>

<!-- KPI 요약 카드 -->
<div class="kpi-row" id="kpiRow"></div>

<div class="main-wrap">

  <!-- 생육단계 범례 -->
  <div class="stage-legend">
    <span class="sl" style="background:#6d4c0f22;border:1px solid #a07820;color:#ffd54f;">파종기</span>
    <span class="sl" style="background:#1b5e2022;border:1px solid #4caf50;color:#81c784;">발아기</span>
    <span class="sl" style="background:#1b5e2033;border:1px solid #66bb6a;color:#a5d6a7;">유묘기</span>
    <span class="sl" style="background:#0d47a133;border:1px solid #42a5f5;color:#90caf9;">월동기</span>
    <span class="sl" style="background:#1b5e2044;border:1px solid #aed581;color:#dce775;">구비대기</span>
    <span class="sl" style="background:#e65100aa;border:1px solid #ffa726;color:#ffcc80;">성숙기</span>
  </div>

  <!-- 메인 통합 차트 -->
  <div class="card">
    <div class="card-title">📊 통합 시계열 — 기온·강수·초장·구경·엽수 (X축 = 날짜 공유)</div>
    <canvas id="mainChart" height="180"></canvas>
  </div>

  <!-- 하단 3분할 -->
  <div class="row3">
    <div class="card">
      <div class="card-title">🌍 지온 / 지습</div>
      <canvas id="soilChart" height="160"></canvas>
    </div>
    <div class="card">
      <div class="card-title">🧪 pH / EC (적정범위 포함)</div>
      <canvas id="phEcChart" height="160"></canvas>
    </div>
    <div class="card">
      <div class="card-title">📡 생육 인자 레이더 (선택 시점)</div>
      <canvas id="radarChart" height="160"></canvas>
    </div>
  </div>

</div>

<script>
// ── 데이터 ──
const MONTHS = ['9월','10월','11월','12월','1월','2월','3월','4월','5월','6월'];
const DATES  = ['2025.09','2025.10','2025.11','2025.12','2026.01','2026.02','2026.03','2026.04','2026.05','2026.06'];
const STAGES = ['파종기','발아기','유묘기','월동기','월동기','구비대기','구비대기','성숙기','성숙기','수확'];
const STAGE_COLORS = ['rgba(109,76,15,0.18)','rgba(56,142,60,0.18)','rgba(46,125,50,0.18)',
                      'rgba(13,71,161,0.18)','rgba(13,71,161,0.18)','rgba(51,105,30,0.22)',
                      'rgba(51,105,30,0.22)','rgba(230,81,0,0.22)','rgba(230,81,0,0.22)','rgba(230,81,0,0.25)'];
const D = {
  temp:  [20,15,8,1,-1,3,10,16,21,24],
  rain:  [85,60,42,15,8,22,55,90,110,70],
  soilT: [17,12,6,1,0,2,6,11,15,19],
  soilM: [55,60,68,72,70,75,65,58,52,48],
  pH:    [6.2,6.3,6.1,6.0,6.0,6.1,6.3,6.5,6.6,6.4],
  EC:    [1.0,1.1,1.2,1.0,0.9,1.1,1.4,1.7,1.8,1.6],
  height:[3,8,18,22,24,26,35,48,55,52],
  bulb:  [0,0,0,0,5,8,25,55,85,95],
  leaf:  [2,3,5,6,6,7,8,9,9,8],
};

// ── 공통 스타일 ──
const G = {color:'rgba(255,255,255,0.05)'};
const TX = {color:'#5a7a5a',font:{size:10}};
const TT = {backgroundColor:'#0a1409',borderColor:'#2e5a2e',borderWidth:1,
            titleColor:'#a5d6a7',bodyColor:'#cde8cd',padding:10,
            callbacks:{title:i=>`📅 ${MONTHS[i[0].dataIndex]}`}};

// 생육단계 배경 플러그인
const stageBg = {
  id:'stageBg',
  beforeDraw(chart){
    const {ctx,chartArea:{left,right,top,bottom},scales:{x}} = chart;
    if(!x) return;
    const step = (right-left)/9;
    STAGE_COLORS.forEach((c,i)=>{
      ctx.fillStyle = c;
      ctx.fillRect(left+i*step, top, step, bottom-top);
    });
  }
};

// 선택 시점 세로선 플러그인
let selectedIdx = 4;
const crosshair = {
  id:'crosshair',
  afterDraw(chart){
    if(selectedIdx == null) return;
    const {ctx,chartArea:{top,bottom},scales:{x}} = chart;
    if(!x) return;
    const xPos = x.getPixelForValue(selectedIdx);
    ctx.save();
    ctx.strokeStyle = '#4caf50';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(xPos,top);
    ctx.lineTo(xPos,bottom);
    ctx.stroke();
    ctx.restore();
  }
};

// ── 메인 통합 차트 ──
const mainChart = new Chart(document.getElementById('mainChart'),{
  type:'bar',
  plugins:[stageBg, crosshair],
  data:{
    labels: MONTHS,
    datasets:[
      {type:'line',label:'기온(°C)',data:D.temp,
       borderColor:'#ef9a9a',backgroundColor:'transparent',
       yAxisID:'yL',tension:.4,pointRadius:4,borderWidth:2,
       pointBackgroundColor: MONTHS.map((_,i)=>i===selectedIdx?'#ef5350':'#ef9a9a'),
       pointRadius: MONTHS.map((_,i)=>i===selectedIdx?7:4)},
      {type:'bar',label:'강수(mm)',data:D.rain,
       backgroundColor:'rgba(100,181,246,0.4)',borderColor:'#64b5f6',borderWidth:1,
       yAxisID:'yR'},
      {type:'line',label:'초장(cm)',data:D.height,
       borderColor:'#a5d6a7',backgroundColor:'transparent',
       yAxisID:'yG',tension:.4,pointRadius:4,borderWidth:2,
       pointBackgroundColor: MONTHS.map((_,i)=>i===selectedIdx?'#4caf50':'#a5d6a7'),
       pointRadius: MONTHS.map((_,i)=>i===selectedIdx?7:4)},
      {type:'line',label:'구경(mm)',data:D.bulb,
       borderColor:'#ffcc80',backgroundColor:'transparent',
       yAxisID:'yG',tension:.4,pointRadius:4,borderWidth:2,
       pointBackgroundColor: MONTHS.map((_,i)=>i===selectedIdx?'#ff9800':'#ffcc80'),
       pointRadius: MONTHS.map((_,i)=>i===selectedIdx?7:4)},
      {type:'line',label:'엽수(매)',data:D.leaf,
       borderColor:'#f48fb1',backgroundColor:'transparent',
       yAxisID:'yG',tension:.4,pointRadius:3,borderWidth:1.5,borderDash:[4,2],
       pointRadius: MONTHS.map((_,i)=>i===selectedIdx?6:3)},
    ]
  },
  options:{
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{ticks:TX,grid:G,border:{color:'rgba(255,255,255,0.06)'}},
      yL:{position:'left',title:{display:true,text:'기온(°C)',color:'#6a8a6a',font:{size:10}},
          ticks:TX,grid:G,min:-10,max:30},
      yR:{position:'right',title:{display:true,text:'강수(mm)',color:'#6a8a6a',font:{size:10}},
          ticks:TX,grid:{display:false},max:150},
      yG:{position:'right',title:{display:true,text:'생육',color:'#6a8a6a',font:{size:10}},
          ticks:TX,grid:{display:false},min:0,max:110,
          offset:true},
    },
    plugins:{
      legend:{labels:{color:'#8aaa8a',font:{size:10},boxWidth:14}},
      tooltip:TT
    }
  }
});

// ── 지온/지습 ──
const soilChart = new Chart(document.getElementById('soilChart'),{
  type:'line',
  plugins:[stageBg,crosshair],
  data:{
    labels:MONTHS,
    datasets:[
      {label:'지온(°C)',data:D.soilT,borderColor:'#ffb74d',backgroundColor:'transparent',
       yAxisID:'yL',tension:.4,pointRadius:3,borderWidth:2},
      {label:'지습(%)',data:D.soilM,borderColor:'#80deea',backgroundColor:'rgba(128,222,234,0.05)',
       yAxisID:'yR',tension:.4,pointRadius:3,borderWidth:2,borderDash:[4,2]},
    ]
  },
  options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{ticks:TX,grid:G},
      yL:{position:'left',ticks:TX,grid:G,title:{display:true,text:'°C',color:'#6a8a6a',font:{size:10}}},
      yR:{position:'right',ticks:TX,grid:{display:false},max:100,title:{display:true,text:'%',color:'#6a8a6a',font:{size:10}}}
    },
    plugins:{legend:{labels:{color:'#8aaa8a',font:{size:10},boxWidth:12}},tooltip:TT}
  }
});

// ── pH / EC ──
const phEcChart = new Chart(document.getElementById('phEcChart'),{
  type:'line',
  plugins:[stageBg,crosshair],
  data:{
    labels:MONTHS,
    datasets:[
      {label:'pH',data:D.pH,borderColor:'#ce93d8',backgroundColor:'transparent',
       yAxisID:'yph',tension:.4,pointRadius:3,borderWidth:2},
      {label:'pH 적정상한',data:Array(10).fill(6.5),borderColor:'rgba(206,147,216,0.3)',
       yAxisID:'yph',pointRadius:0,borderWidth:1,borderDash:[5,3]},
      {label:'EC(dS/m)',data:D.EC,borderColor:'#fff176',backgroundColor:'transparent',
       yAxisID:'yec',tension:.4,pointRadius:3,borderWidth:2},
      {label:'EC 적정상한',data:Array(10).fill(2.0),borderColor:'rgba(255,241,118,0.3)',
       yAxisID:'yec',pointRadius:0,borderWidth:1,borderDash:[5,3]},
    ]
  },
  options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{ticks:TX,grid:G},
      yph:{position:'left',min:5.5,max:7,ticks:TX,grid:G,
           title:{display:true,text:'pH',color:'#ce93d8',font:{size:10}}},
      yec:{position:'right',min:0,max:3,ticks:TX,grid:{display:false},
           title:{display:true,text:'EC',color:'#fff176',font:{size:10}}}
    },
    plugins:{
      legend:{labels:{color:'#8aaa8a',font:{size:10},boxWidth:12,
                      filter:i=>!i.text.includes('적정')}},
      tooltip:TT
    }
  }
});

// ── 레이더 ──
const radarChart = new Chart(document.getElementById('radarChart'),{
  type:'radar',
  data:{
    labels:['기온','지온','지습','초장','구경','엽수'],
    datasets:[
      {label:'선택 시점',data:[50,50,50,50,50,50],
       borderColor:'#4caf50',backgroundColor:'rgba(76,175,80,0.15)',pointRadius:3,borderWidth:2},
      {label:'최대값 기준',data:[100,100,100,100,100,100],
       borderColor:'rgba(255,255,255,0.05)',backgroundColor:'transparent',pointRadius:0,borderWidth:1}
    ]
  },
  options:{
    responsive:true,maintainAspectRatio:false,
    scales:{r:{
      min:0,max:100,
      ticks:{display:false,stepSize:20},
      grid:{color:'rgba(255,255,255,0.07)'},
      pointLabels:{color:'#8aaa8a',font:{size:10}},
      angleLines:{color:'rgba(255,255,255,0.07)'}
    }},
    plugins:{legend:{labels:{color:'#8aaa8a',font:{size:10},boxWidth:12}}}
  }
});

// ── KPI 카드 정의 ──
const KPI_DEFS = [
  {key:'temp',  icon:'🌡️', label:'기온',  unit:'°C',  color:'#ef9a9a', thres:{lo:-5,hi:25}},
  {key:'rain',  icon:'🌧️', label:'강수량',unit:'mm',  color:'#90caf9', thres:{lo:0, hi:100}},
  {key:'soilT', icon:'🌍', label:'지온',  unit:'°C',  color:'#ffb74d', thres:{lo:0, hi:20}},
  {key:'soilM', icon:'💧', label:'지습',  unit:'%',   color:'#80deea', thres:{lo:40,hi:80}},
  {key:'pH',    icon:'🧪', label:'pH',   unit:'',    color:'#ce93d8', thres:{lo:6.0,hi:6.5}},
  {key:'EC',    icon:'⚡', label:'EC',   unit:'dS/m',color:'#fff176', thres:{lo:1.0,hi:2.0}},
  {key:'height',icon:'🌱', label:'초장',  unit:'cm',  color:'#a5d6a7', thres:{lo:0, hi:60}},
  {key:'bulb',  icon:'🧅', label:'구경',  unit:'mm',  color:'#ffcc80', thres:{lo:0, hi:100}},
  {key:'leaf',  icon:'🍃', label:'엽수',  unit:'매',  color:'#f48fb1', thres:{lo:0, hi:10}},
];

function updateAll(idx){
  selectedIdx = idx;

  // 날짜 표시
  document.getElementById('dateDisplay').textContent = DATES[idx];

  // KPI 카드
  const row = document.getElementById('kpiRow');
  row.innerHTML = '';
  // 생육단계 카드
  const stageDiv = document.createElement('div');
  stageDiv.className = 'kpi';
  stageDiv.style.borderColor = '#4caf50';
  stageDiv.innerHTML = `<div class="k-label">🌿 생육단계</div>
    <div class="k-val" style="color:#6ddb6d;font-size:15px;">${STAGES[idx]}</div>
    <div class="k-sub">D+${idx*30}일 경과</div>`;
  row.appendChild(stageDiv);

  KPI_DEFS.forEach(k=>{
    const val = D[k.key][idx];
    const prev = idx>0 ? D[k.key][idx-1] : val;
    const diff = (val - prev).toFixed(1);
    const arrow = diff>0?'▲':diff<0?'▼':'─';
    const arrowColor = diff>0?'#ef5350':diff<0?'#42a5f5':'#5a7a5a';
    // 적정범위 체크
    const inRange = val>=k.thres.lo && val<=k.thres.hi;
    const borderC = inRange ? '#1e3a20' : '#b71c1c';
    const d = document.createElement('div');
    d.className = 'kpi';
    d.style.borderColor = borderC;
    d.innerHTML = `<div class="k-label">${k.icon} ${k.label}</div>
      <div class="k-val" style="color:${k.color};">${val}${k.unit}</div>
      <div class="k-sub" style="color:${arrowColor};">${arrow} 전월比 ${diff}${k.unit}${!inRange?' ⚠':''}`;
    row.appendChild(d);
  });

  // 차트 crosshair 업데이트 (point 강조)
  [mainChart].forEach(chart=>{
    chart.data.datasets.forEach(ds=>{
      if(ds.pointRadius && Array.isArray(ds.pointRadius)){
        ds.pointRadius = ds.pointRadius.map((_,i)=>i===idx?7:(ds.type==='bar'?0:3));
      }
      if(ds.pointBackgroundColor && Array.isArray(ds.pointBackgroundColor)){
        ds.pointBackgroundColor = ds.pointBackgroundColor.map((c,i)=>{
          if(i!==idx) return ds.borderColor;
          if(ds.label.includes('기온')) return '#ef5350';
          if(ds.label.includes('초장')) return '#4caf50';
          if(ds.label.includes('구경')) return '#ff9800';
          return '#fff';
        });
      }
    });
    chart.update('none');
  });
  [soilChart, phEcChart].forEach(c=>c.update('none'));

  // 레이더 업데이트
  const maxes = {temp:30,soilT:20,soilM:100,height:60,bulb:100,leaf:10};
  const normalize = (v,max)=>Math.round(Math.max(0,v)/max*100);
  radarChart.data.datasets[0].data = [
    normalize(D.temp[idx]+10, 40),
    normalize(D.soilT[idx]+5, 25),
    normalize(D.soilM[idx],100),
    normalize(D.height[idx],60),
    normalize(D.bulb[idx],100),
    normalize(D.leaf[idx],10),
  ];
  radarChart.data.datasets[0].label = `${DATES[idx]} 시점`;
  radarChart.update();
}

// 슬라이더 이벤트
document.getElementById('slider').addEventListener('input', e=>{
  updateAll(Number(e.target.value));
});

// 초기 렌더
updateAll(4);
</script>
</body>
</html>
